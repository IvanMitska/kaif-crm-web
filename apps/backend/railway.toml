[build]
builder = "nixpacks"
buildCommand = "pnpm install && cd apps/backend && npx prisma generate && pnpm run build"

[deploy]
startCommand = "cd apps/backend && npx prisma db push || true && node dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
