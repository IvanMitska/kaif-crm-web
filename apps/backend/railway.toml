[build]
builder = "nixpacks"
buildCommand = "pnpm install && cd apps/backend && npx prisma generate && pnpm run build"

[deploy]
startCommand = "cd apps/backend && echo '=== Running Prisma DB Push ===' && npx prisma db push --skip-generate --accept-data-loss 2>&1 && echo '=== DB Push Complete ===' && node dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
