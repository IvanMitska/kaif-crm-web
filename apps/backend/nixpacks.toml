[phases.install]
cmds = ["npm install -g corepack@0.24.1 && corepack enable && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "cd apps/backend && npx prisma db push --skip-generate && npx prisma migrate resolve --applied 20250831101920_init || true && npx prisma migrate resolve --applied 20250331150000_add_multitenant || true && node dist/main.js"
