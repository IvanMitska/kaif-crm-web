[build]
builder = "nixpacks"
buildCommand = "pnpm install && cd apps/frontend && pnpm run build && mkdir -p .next/standalone/apps/frontend/.next && cp -r .next/static .next/standalone/apps/frontend/.next/ || true"

[deploy]
startCommand = "cd apps/frontend/.next/standalone && HOSTNAME=0.0.0.0 node apps/frontend/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
